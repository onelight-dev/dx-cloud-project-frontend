<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 - SPOFFY</title>
  <link rel="stylesheet" href="css/common.css"/>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>

  <header class="top-line">
    <div class="wrap topbar">
      <a href="index.html" class="brand"><span class="brand-text">Spoffy</span></a>
      <div class="header-actions">
        <a href="cart.html" class="icon-action" aria-label="장바구니" style="position:relative;">
          <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="cart-badge hidden">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-wrap">
      <div class="auth-card panel">

        <p class="auth-eyebrow">SPOFFY</p>
        <h1 class="auth-title">로그인</h1>
        <p class="auth-sub">계속하려면 로그인해주세요.</p>

        <!-- E-6. 구글 로그인 -->
        <button class="social-btn" id="google-btn">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Google로 계속하기
        </button>

        <div class="divider"><span>또는 이메일로 로그인</span></div>

        <form id="login-form" novalidate>
          <!-- E-1. 아이디 -->
          <div class="form-group">
            <label class="form-label" for="login-id">아이디 (이메일)</label>
            <input type="email" id="login-id" class="input" placeholder="example@email.com" autocomplete="email"/>
            <p class="input-error-msg hidden" id="id-error"></p>
          </div>

          <!-- E-2. 비밀번호 -->
          <div class="form-group" style="margin-top:14px;">
            <label class="form-label" for="login-pw">비밀번호</label>
            <div class="pw-wrap">
              <input type="password" id="login-pw" class="input" placeholder="비밀번호 입력" autocomplete="current-password"/>
              <button type="button" class="pw-toggle" id="pw-toggle" aria-label="비밀번호 보기">👁</button>
            </div>
            <p class="input-error-msg hidden" id="pw-error"></p>
          </div>

          <!-- E-3. 옵션 -->
          <div class="login-options">
            <label class="checkbox-label">
              <input type="checkbox" id="save-id"/> 아이디 저장
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="auto-login"/> 자동 로그인
            </label>
          </div>

          <!-- E-5. 로그인 실패 -->
          <div class="login-error hidden" id="login-error">
            아이디 또는 비밀번호가 올바르지 않습니다.
          </div>

          <!-- E-4. 로그인 버튼 -->
          <button type="submit" class="btn primary wide lg" id="login-btn" style="margin-top:20px;">
            로그인
          </button>
        </form>

        <!-- E-7. 회원가입 이동 -->
        <div class="auth-footer">
          <p>아직 회원이 아니신가요?</p>
          <a href="signup.html" class="btn wide" style="margin-top:10px;">회원가입</a>
        </div>

      </div>
    </div>
  </main>

  <div id="toast-container"></div>
  <script src="js/common.js"></script>
  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
