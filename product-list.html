<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>상품 목록 - SPOFFY</title>
  <link rel="stylesheet" href="css/common.css"/>
  <link rel="stylesheet" href="css/product-list.css"/>
</head>
<body>

  <div id="header"></div>

  <!-- C-5. 검색바 -->
  <div class="search-bar-wrap hidden" id="search-bar-wrap">
    <div class="wrap">
      <div class="search-bar">
        <input type="search" class="search-input" id="search-input"
          placeholder="상품명, 브랜드 검색..." autocomplete="off"/>
        <button class="search-submit" id="search-submit">검색</button>
        <button class="search-close" id="search-close">✕</button>
      </div>
    </div>
  </div>

  <main>
    <div class="wrap page">

      <!-- Page title -->
      <div class="list-page-head">
        <h1 id="page-title">전체 상품</h1>
        <p id="product-count" class="product-count"></p>
      </div>

      <div class="list-layout">

        <div class="list-content">
          <!-- C-2. 정렬 -->
          <div class="sort-bar">
            <div class="sort-right">
              <select class="sort-select input" id="sort-select">
                <option value="popular">인기순</option>
                <option value="new">최신순</option>
                <option value="low">낮은 가격순</option>
                <option value="high">높은 가격순</option>
                <option value="discount">할인율순</option>
              </select>
            </div>
          </div>

          <!-- C-3. 상품 리스트 -->
          <div class="product-grid" id="product-grid">
            <!-- JS로 렌더링 -->
          </div>

          <!-- 빈 상태 -->
          <div class="empty-state hidden" id="empty-state">
            <div class="empty-icon">🔍</div>
            <h3>검색 결과가 없습니다</h3>
            <p>다른 검색어나 필터를 시도해보세요.</p>
          </div>

          <!-- C-4. 페이지네이션 -->
          <div class="pagination" id="pagination">
            <button class="page-btn" id="page-prev" disabled>이전</button>
            <div class="page-numbers" id="page-numbers"></div>
            <button class="page-btn" id="page-next">다음</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- ── FOOTER ── -->
  <div id="footer"></div>

  <script src="js/common.js"></script>
  <script src="js/config.js"></script>
  <script src="js/product-list.js"></script>
</body>
</html>
