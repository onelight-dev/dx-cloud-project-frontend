<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>위시리스트 - SPOFFY</title>
  <link rel="stylesheet" href="css/common.css"/>
  <link rel="stylesheet" href="css/wishlist.css"/>
</head>
<body>

  <header class="top-line">
    <div class="wrap topbar">
      <a href="index.html" class="brand"><span class="brand-text">Spoffy</span></a>
      <div class="header-actions">
        <button class="icon-action" aria-label="검색" onclick="window.location.href='product-list.html'">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        </button>
        <a href="mypage.html" class="icon-action" aria-label="마이페이지">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M2 21c0-5.523 4.477-10 10-10s10 4.477 10 10"/></svg>
        </a>
        <a href="cart.html" class="icon-action" aria-label="장바구니" style="position:relative;">
          <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="cart-badge hidden">0</span>
        </a>
        <button id="header-login-btn" class="header-text-btn" onclick="window.location.href='login.html'">로그인</button>
        <button id="header-logout-btn" class="header-text-btn hidden">로그아웃</button>
      </div>
    </div>
    <nav class="category-row"><div class="wrap">
      <ul class="categories">
        <li><a href="product-list.html?cat=set">코디 세트</a></li>
        <li><a href="product-list.html?cat=outer">아우터</a></li>
        <li><a href="product-list.html?cat=top">상의</a></li>
        <li><a href="product-list.html?cat=bottom">하의</a></li>
        <li><a href="product-list.html?cat=shoes">신발</a></li>
      </ul>
    </div></nav>
  </header>

  <main>
    <div class="wrap page">

      <div class="wish-page-head">
        <h1 class="page-title">위시리스트</h1>
        <p class="wish-count" id="wish-count"></p>
      </div>

      <!-- L-1. 위시리스트 상품 리스트 -->
      <div class="empty-state hidden" id="wish-empty">
        <div class="empty-icon">♡</div>
        <h3>찜한 상품이 없습니다</h3>
        <p>마음에 드는 상품을 찜해보세요.</p>
        <a href="product-list.html" class="btn primary" style="margin-top:20px;">쇼핑하러 가기</a>
      </div>

      <div id="wish-grid" class="product-grid">
        <!-- JS로 렌더링 -->
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div class="footer-inner">
        <div><div class="footer-brand-text">Spoffy</div></div>
        <div class="footer-col"><h4>Services</h4><a href="product-list.html">상품 목록</a></div>
        <div class="footer-col"><h4>고객센터</h4><a href="#">이용약관</a></div>
      </div>
      <div class="footer-bottom"><p class="footer-copyright">© 2025 SPOFFY Inc.</p></div>
    </div>
  </footer>

  <div id="toast-container"></div>
  <script src="js/common.js"></script>
  <script src="js/wishlist.js"></script>
</body>
</html>
