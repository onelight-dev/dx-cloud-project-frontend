<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>상품 목록 - SPOFFY</title>
  <link rel="stylesheet" href="css/common.css"/>
  <link rel="stylesheet" href="css/product-list.css"/>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="top-line">
    <div class="wrap topbar">
      <a href="index.html" class="brand"><span class="brand-text">Spoffy</span></a>
      <div class="header-actions">
        <button class="icon-action" aria-label="검색" id="search-toggle-btn">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        </button>
        <a href="mypage.html" class="icon-action" aria-label="마이페이지">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M2 21c0-5.523 4.477-10 10-10s10 4.477 10 10"/></svg>
        </a>
        <a href="cart.html" class="icon-action" aria-label="장바구니" style="position:relative;">
          <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="cart-badge hidden">0</span>
        </a>
        <button id="header-login-btn" class="header-text-btn" onclick="window.location.href='login.html'">로그인</button>
        <button id="header-logout-btn" class="header-text-btn hidden">로그아웃</button>
      </div>
    </div>
    <nav class="category-row" aria-label="카테고리">
      <div class="wrap">
        <ul class="categories">
          <li><a href="product-list.html?cat=set">코디 세트</a></li>
          <li><a href="product-list.html?cat=outer">아우터</a></li>
          <li><a href="product-list.html?cat=top">상의</a></li>
          <li><a href="product-list.html?cat=bottom">하의</a></li>
          <li><a href="product-list.html?cat=shoes">신발</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- C-5. 검색바 -->
  <div class="search-bar-wrap hidden" id="search-bar-wrap">
    <div class="wrap">
      <div class="search-bar">
        <input type="search" class="search-input" id="search-input"
          placeholder="상품명, 브랜드 검색..." autocomplete="off"/>
        <button class="search-submit" id="search-submit">검색</button>
        <button class="search-close" id="search-close">✕</button>
      </div>
    </div>
  </div>

  <main>
    <div class="wrap page">

      <!-- Page title -->
      <div class="list-page-head">
        <h1 id="page-title">전체 상품</h1>
        <p id="product-count" class="product-count"></p>
      </div>

      <div class="list-layout">

        <div class="list-content">
          <!-- C-2. 정렬 -->
          <div class="sort-bar">
            <div class="sort-right">
              <select class="sort-select input" id="sort-select">
                <option value="popular">인기순</option>
                <option value="new">최신순</option>
                <option value="low">낮은 가격순</option>
                <option value="high">높은 가격순</option>
                <option value="discount">할인율순</option>
              </select>
            </div>
          </div>

          <!-- C-3. 상품 리스트 -->
          <div class="product-grid" id="product-grid">
            <!-- JS로 렌더링 -->
          </div>

          <!-- 빈 상태 -->
          <div class="empty-state hidden" id="empty-state">
            <div class="empty-icon">🔍</div>
            <h3>검색 결과가 없습니다</h3>
            <p>다른 검색어나 필터를 시도해보세요.</p>
          </div>

          <!-- C-4. 페이지네이션 -->
          <div class="pagination" id="pagination">
            <button class="page-btn" id="page-prev" disabled>이전</button>
            <div class="page-numbers" id="page-numbers"></div>
            <button class="page-btn" id="page-next">다음</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <div class="wrap">
      <div class="footer-inner">
        <div>
          <div class="footer-brand-text">Spoffy</div>
          <p class="footer-desc">패션 코디 세트 쇼핑몰<br>AI 피팅으로 나만의 스타일을 찾아보세요.</p>
        </div>
        <div class="footer-col">
          <h4>Services</h4>
          <a href="product-list.html">상품 목록</a>
          <a href="ai-fitting.html">AI 피팅</a>
          <a href="mypage.html">마이페이지</a>
        </div>
        <div class="footer-col">
          <h4>고객센터</h4>
          <a href="#">이용약관</a>
          <a href="#">개인정보처리방침</a>
          <a href="#">1:1 문의</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p class="footer-copyright">© 2025 SPOFFY Inc. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <div id="toast-container"></div>

  <script src="js/common.js"></script>
  <script src="js/product-list.js"></script>
</body>
</html>
