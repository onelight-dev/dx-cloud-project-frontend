<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>장바구니 - SPOFFY</title>
  <link rel="stylesheet" href="css/common.css"/>
  <link rel="stylesheet" href="css/cart.css"/>
</head>
<body>

  <div id="header"></div>

  <main>
    <div class="wrap page">
      <h1 class="page-title">장바구니</h1>

      <!-- Empty state -->
      <div class="empty-state hidden" id="cart-empty">
        <div class="empty-icon">🛒</div>
        <h3>장바구니가 비어있습니다</h3>
        <p>마음에 드는 상품을 담아보세요.</p>
        <a href="product-list.html" class="btn primary" style="margin-top:20px;">쇼핑 계속하기</a>
      </div>

      <!-- Cart content -->
      <div class="cart-layout" id="cart-content">

        <!-- G-1~G-4. 상품 리스트 -->
        <div class="cart-list-wrap">

          <div class="cart-list-head">
            <label class="checkbox-label">
              <input type="checkbox" id="select-all"/> 전체 선택
            </label>
            <div class="cart-head-actions">
              <button class="btn sm" id="delete-selected">선택 삭제</button>
              <button class="btn sm" id="delete-all">전체 삭제</button>
            </div>
          </div>

          <div id="cart-items">
            <!-- JS로 렌더링 -->
          </div>
        </div>

        <!-- G-5~G-9. 금액 요약 -->
        <aside class="cart-summary panel">
          <h3 class="summary-title">주문 금액</h3>

          <!-- G-5. 총 상품 금액 -->
          <div class="sum-row">
            <span>상품 금액</span>
            <span id="sum-products">0원</span>
          </div>
          <!-- G-6. 할인 금액 -->
          <div class="sum-row">
            <span>할인 금액</span>
            <span id="sum-discount" class="discount-val">-0원</span>
          </div>
          <!-- G-7. 배송비 -->
          <div class="sum-row">
            <span>배송비</span>
            <span id="sum-shipping">3,000원</span>
          </div>
          <!-- G-8. 최종 결제 금액 -->
          <div class="sum-row total">
            <span>최종 결제 금액</span>
            <span id="sum-total">0원</span>
          </div>

          <!-- G-9. 주문하기 -->
          <button class="btn primary wide lg" id="order-btn" style="margin-top:20px;">
            주문하기
          </button>
          <a href="product-list.html" class="btn wide" style="margin-top:10px;">쇼핑 계속하기</a>

          <p class="free-ship-note" id="free-ship-note"></p>
        </aside>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/common.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
